<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Rigby</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-logo">Rigby</a>
      <div class="nav-links">
        <a href="/">Feed</a>
        <a href="/downloads">Downloads</a>
      </div>
      <div class="nav-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
        <button class="hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div id="nav-auth">
          <a href="/login" class="btn btn-secondary btn-sm">Login</a>
          <a href="/register" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
      </div>
    </div>
  </nav>

  <div id="mobile-menu" class="mobile-menu">
    <div class="mobile-menu-header">
      <a href="/" class="nav-logo">Rigby</a>
      <button class="mobile-menu-close" onclick="toggleMobileMenu()">✕</button>
    </div>
    <a href="/" onclick="toggleMobileMenu()">Feed</a>
    <a href="/downloads" onclick="toggleMobileMenu()">Downloads</a>
  </div>

  <main class="container" style="max-width:600px;margin:2rem auto;padding:0 1rem">
    <div id="profile-content">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
<div id="toast-container"></div>
</body>
</html>
